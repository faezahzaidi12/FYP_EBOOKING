<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>LOG IN</title>
    <!-- Bootstrap and Font Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <!-- Link ke style_index.css yang berada di dalam folder yang sama -->
    <link rel="stylesheet" href="style_index.css">

    <!-- REQUIRED: Supabase JS SDK. Must load sebelum fail inline script di bawah diimport [33] -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="roblox-card text-center text-uppercase">
        <div class="logo-frame">
            <img src="logo_tvetmara.png" style="width: 100%;">
        </div>
        <div class="inner-container">
            <h2 class="font-bungee mb-1">LOG IN</h2>
            <p class="small text-muted mb-4 fw-bold">MYTVETMARA e-BOOKING</p>
            <div class="text-start mb-3">
                <label class="fw-bold small">EMAIL :</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="EMAIL">
            </div>
            <div class="text-start mb-4">
                <label class="fw-bold small">PASSWORD:</label>
                <input type="password" id="loginPass" class="form-control" placeholder="PASSWORD">
            </div>

            <!-- Butang LET'S GO memanggil fungsi doLogin() di bawah -->
            <button class="btn btn-roblox btn-success w-100 py-3 fs-3 text-white mb-3" onclick="doLogin()">LET'S GO!</button>
            <!-- Menukar register.html kepada Register.html (huruf besar R) supaya sepadan dengan nama fail sebenar! [28] -->
            <button class="btn btn-roblox btn-primary w-100 py-2" onclick="window.location.href='Register.html'">SIGN UP</button>
        </div>
    </div>

    <script>
        // Masukkan URL dan Kunci Supabase Projek Awak
        const supabaseUrl = 'https://doyyrhhscdpchuvpancq.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRveXlyaGhzY2RwY2h1dnBhbmNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MjkzNjksImV4cCI6MjA5NTIwNTM2OX0.liPsexqKQTnZe5UpB1DW5zpZ12I05REflxYaNbf6l8A';

        // Inisialisasi sambungan Supabase [1.1.3]
        const _supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

        // FUNGSI LOG MASUK UTAMA (LOGIN)
        async function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPass').value;

            // 1. Pastikan semua ruangan diisi
            if (!email || !password) {
                alert("PLEASE FILL ALL FIELDS!");
                return;
            }

            // 2. Log masuk menggunakan emel dan password [1.1.3]
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                alert("Login Gagal: " + error.message);
                console.error(error);
            } else {
                // Simpan maklumat login pelajar secara lokal di browser
                localStorage.setItem('currentUser', data.user.user_metadata.display_name || data.user.email);
                localStorage.setItem('currentUserId', data.user.id);
                
                alert('Login Successful! Welcome back.');
                window.location.href = 'home.html'; // Bawa pengguna ke dashboard utama (home.html) [35]
            }
        }
    </script>
</body>
</html>
