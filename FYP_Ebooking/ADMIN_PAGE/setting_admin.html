<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>ROOM MANAGEMENT | ADMIN</title>
    <!-- Framework & Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Link ke CSS Utama & Admin -->
    <link rel="stylesheet" href="style_index.css">
    <link rel="stylesheet" href="style_settingadmin.css">
</head>
<body style="background-color: #f0f2f5;">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark p-3 shadow-sm" style="background-color: #fbc02d; border-bottom: 5px solid #393B3D;">
        <div class="container text-uppercase">
            <a class="navbar-brand font-bungee text-dark d-flex align-items-center" href="#">
                <i class="bi bi-gear-wide-connected me-2"></i> MAP & ASSET EDITOR
            </a>
            <button class="btn btn-dark btn-sm font-bungee border-2 border-white" onclick="window.location.href='admin_home.html'">BACK</button>
        </div>
    </nav>

    <div class="container mt-5 pb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="font-bungee text-dark mb-0">ROOM INVENTORY</h2>
            <button class="btn btn-roblox btn-success" onclick="alert('Feature: Add New Room')">
                <i class="bi bi-plus-lg"></i> ADD NEW ROOM
            </button>
        </div>

        <!-- GRID SENARAI BILIK -->
        <div class="row g-4 text-uppercase">
            
            <!-- BILIK 1 (DFK 1) -->
            <div class="col-md-6 col-lg-4">
                <div class="card room-asset-card h-100">
                    <div class="room-preview-sm">
                        <img src="https://media.architecturaldigest.com/photos/573489112959663327663f7d/16:9/w_2560%2Cc_limit/modern-office-spaces-01.jpg" alt="BK1">
                        <span class="badge bg-success status-tag">ONLINE</span>
                    </div>
                    <div class="card-body">
                        <h4 class="font-bungee mb-3">ROOM DFK 1</h4>
                        <div class="asset-mini-list mb-4">
                            <div class="d-flex justify-content-between mb-2 border-bottom pb-1">
                                <span><i class="bi bi-person-workspace"></i> CHAIRS:</span>
                                <span class="fw-bold text-primary">20</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2 border-bottom pb-1">
                                <span><i class="bi bi-table"></i> TABLES:</span>
                                <span class="fw-bold text-primary">20</span>
                            </div>
                            <div class="d-flex justify-content-between">
                                <span><i class="bi bi-pc-display"></i> COMPUTERS:</span>
                                <span class="fw-bold text-primary">20</span>
                            </div>
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-roblox btn-primary" onclick="openEditModal('DFK 1', 20, 20, 20)">
                                <i class="bi bi-pencil-square"></i> EDIT ASSETS
                            </button>
                            <button class="btn btn-roblox btn-warning text-dark" onclick="confirm('Put room in Maintenance Mode?')">
                                <i class="bi bi-tools"></i> MAINTENANCE
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BILIK 2 (DFK 2) -->
            <div class="col-md-6 col-lg-4">
                <div class="card room-asset-card h-100 opacity-75">
                    <div class="room-preview-sm" style="filter: grayscale(1);">
                        <div class="d-flex align-items-center justify-content-center h-100 bg-secondary text-white font-bungee">NO PHOTO</div>
                        <span class="badge bg-danger status-tag">OFFLINE</span>
                    </div>
                    <div class="card-body text-muted">
                        <h4 class="font-bungee mb-3">ROOM DFK 2</h4>
                        <p class="small fw-bold">This room is currently hidden from players.</p>
                        <button class="btn btn-roblox btn-success w-100" onclick="alert('Room DFK 2 is now Online!')">ENABLE ROOM</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- MODAL EDIT ASSET (Ini yang paling penting untuk Admin) -->
    <div class="modal fade" id="editRoomModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-5 border-dark rounded-0">
                <div class="modal-header bg-primary text-white border-0">
                    <h5 class="modal-title font-bungee">EDIT <span id="editRoomName">---</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-uppercase">
                    <div class="mb-3">
                        <label class="fw-bold small">TOTAL CHAIRS:</label>
                        <input type="number" id="editChair" class="form-control border-3 border-dark fw-bold">
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold small">TOTAL TABLES:</label>
                        <input type="number" id="editTable" class="form-control border-3 border-dark fw-bold">
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold small">TOTAL COMPUTERS:</label>
                        <input type="number" id="editPC" class="form-control border-3 border-dark fw-bold">
                    </div>
                    <div class="mb-1">
                        <label class="fw-bold small">UPDATE PHOTO:</label>
                        <input type="file" class="form-control border-3 border-dark">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-roblox btn-success w-100 py-2 fs-5" onclick="saveAssets()">SAVE CHANGES</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function openEditModal(name, chair, table, pc) {
            document.getElementById('editRoomName').innerText = name;
            document.getElementById('editChair').value = chair;
            document.getElementById('editTable').value = table;
            document.getElementById('editPC').value = pc;
            new bootstrap.Modal(document.getElementById('editRoomModal')).show();
        }

        function saveAssets() {
            alert("SUCCESS! Assets for " + document.getElementById('editRoomName').innerText + " have been updated in the cloud.");
            location.reload();
        }
    </script>
</body>
</html>
