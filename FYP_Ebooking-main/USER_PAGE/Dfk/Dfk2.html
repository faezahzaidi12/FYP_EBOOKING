<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFK 2</title>
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <!-- Link ke fail CSS yang sama -->
    <link rel="stylesheet" href="../style_index.css">
    <style>
        .slot-booked {
            background-color: #ff4d4d !important; /* Warna merah Roblox */
            color: white !important;
            font-family: 'Bungee', sans-serif !important; 
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #343a40 !important; 
            text-align: center;
            vertical-align: middle;
        }
        .slot-available {
            background-color: #ffffff !important; /* Warna putih */
            color: #000000 !important; /* Tulisan hitam */
            font-family: 'Bungee', sans-serif !important; 
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #343a40 !important; 
            text-align: center;
            vertical-align: middle;
            cursor: pointer;
        }
    </style>
</head>
<body style="background-color: #e0e0e0;">

    <nav class="navbar navbar-dark mb-4 p-3 shadow">
        <div class="container text-uppercase">
            <a class="navbar-brand font-bungee" href="#"><i class="bi bi-box-seam-fill"></i> TVETMARA BESUT e-BOOKING</a>
            <div class="d-flex align-items-center text-white fw-bold">
                <a href="roomdfk_selection.html" class="btn btn-primary btn-sm ms-3 font-bungee border-2 border-white">BACK</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 pb-5 text-uppercase">
        <!-- Info Card -->
        <div class="card p-4 bg-white mb-4 border-4 border-dark shadow">
            <div class="row align-items-center mb-3">
                <div class="col-md-8 text-center text-md-start">
                    <h2 class="font-bungee text-dark mb-1">ROOM DFK 2</h2>
                </div>
            </div>
            <div class="d-flex flex-wrap gap-2 mt-2">
                <span class="btn btn-roblox bg-warning text-white border-2 border-dark p-2">20 CHAIR</span>
                <span class="btn btn-roblox bg-info text-white border-2 border-dark p-2">20 TABLE</span>
                <span class="btn btn-roblox bg-primary text-white border-2 border-dark p-2" style="background-color: #6f42c1 !important;">20 COMPUTER</span>
                <button class="btn btn-roblox btn-success btn-sm ms-md-2" onclick="showRoomPhoto()">
                    <i class="bi bi-camera-fill"></i> PHOTO
                </button>
            </div>
        </div>

        <!-- JADUAL LANDSCAPE -->
        <div class="card bg-dark p-0 overflow-hidden border-4 border-dark shadow">
            <div class="table-responsive">
                <table class="table table-bordered mb-0">
                    <thead class="bg-dark text-white text-center">
                        <tr>
                            <th class="sticky-col py-3 text-nowrap" style="min-width: 140px; background-color: #212529;">DATE/TIME</th>
                            <script>
                                window.times = ["8:15 AM", "9:15 AM", "10:15 AM", "10:45 AM", "11:45 AM", "12:45 PM", "2:00 PM", "3:00 PM", "4:00 PM", "5:00 PM", "6:00 PM"];
                                window.times.forEach(t => document.write(`<th class="py-3 text-nowrap" style="min-width: 110px;">${t}</th>`));
                            </script>
                        </tr>
                    </thead>
                    <tbody id="timetableBody">
                        <script>
                            // DIKEMASKINI: Ejaan TUESDAY [22]
                            const days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY"];
                            days.forEach(day => {
                                document.write(`<tr>`);
                                document.write(`<td class="sticky-col fw-bold text-center border-2 border-dark bg-info text-dark font-bungee" style="vertical-align: middle;">${day}</td>`);
                                window.times.forEach(time => {
                                    document.write(`<td class="timetable-slot slot-available"
                                        id="${day}-${time.replace(/[: ]/g, '')}"
                                        data-day="${day}"
                                        data-time="${time}"
                                        onclick="handleSlotClick('${day}', '${time}')">AVAILABLE</td>`);
                                });
                                document.write(`</tr>`);
                            });
                        </script>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- GAMBAR BILIK -->
    <div class="modal fade" id="photoModal">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-5 border-dark rounded-0">
                <div class="modal-header bg-success text-white border-0">
                    <h5 class="modal-title font-bungee">DFK2 ROOM'S PHOTO</h5>
                </div>
                <div class="modal-body text-center bg-light">
                    <img src="https://media.architecturaldigest.com/photos/573489112959663327663f7d/16:9/w_2560%2Cc_limit/modern-office-space.jpg" class="img-fluid border-4 border-dark shadow" alt="Bilik DFK 2">
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-roblox btn-dark w-100" data-bs-dismiss="modal">CLOSE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- BORANG TEMPAHAN -->
    <div class="modal fade" id="bookingModal">
        <div class="modal-dialog text-uppercase">
            <div class="modal-content border-5 border-dark rounded-0">
                <div class="modal-header bg-primary text-white border-0">
                    <h5 class="modal-title font-bungee">NEW BOOKING</h5>
                </div>
                <div class="modal-body">
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="fw-bold small">DATE:</label>
                            <input type="text" id="mDay" class="form-control fw-bold" readonly>
                        </div>
                        <div class="col-6">
                            <label class="fw-bold small">START:</label>
                            <input type="text" id="mStart" class="form-control fw-bold" readonly>
                        </div>
                    </div>
                    <div class="mb-3">
                        <!-- DIKEMASKINI: Mengikut label END OF SESSION [18] -->
                        <label class="fw-bold small text-dark">END OF SESSION:</label>
                        <select id="mEnd" class="form-select border-3 border-dark fw-bold text-center"></select>
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold small">SUBJECT:</label>
                        <select id="mSubject" class="form-select border-3 border-dark fw-bold text-center">
                            <option value="" selected disabled hidden>SELECT</option> 
                            <option value="NETWORK">NETWORK</option>
                            <option value="DATABASE">DATABASE</option>
                            <option value="IT EMERGING">IT EMERGING</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold small">LECTURER:</label>
                        <input type="text" id="mLecturer" class="form-control border-2 border-dark" placeholder="LECTURER NAME">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-roblox btn-success w-100 py-2 fs-5" onclick="processBooking()">PROCEED</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL 3: INFO, CHECK-IN & CANCEL -->
    <div class="modal fade" id="infoModal" tabindex="-1">
        <div class="modal-dialog text-uppercase">
            <div class="modal-content border-5 border-dark rounded-0 text-center">
                <div class="modal-header bg-dark text-white border-0">
                    <h5 class="modal-title font-bungee w-100">INFORMATION</h5>
                </div>
                <div class="modal-body py-4">
                    <h2 class="font-bungee text-danger mb-0" id="infoBooker">NAME</h2>
                    <div class="text-start bg-light p-3 border-2 border-dark mt-3">
                        <p class="mb-1"><strong>SUBJECT:</strong> <span id="infoSubject">---</span></p>
                        <p class="mb-1"><strong>LECTURER:</strong> <span id="infoLecturer">---</span></p>
                        <p class="mb-1"><strong>TIME:</strong> <span id="infoTimeRange">---</span></p>
                        <p class="mb-0"><strong>STATUS:</strong> <span id="infoStatus" class="fw-bold">---</span></p>
                    </div>
                    
                    <button id="btnCheckIn" class="btn btn-roblox btn-success w-100 mt-4 py-3 fs-5" onclick="checkInBooking()">CONFIRM & CHECK-IN NOW</button>
                    <button class="btn btn-roblox btn-danger w-100 mt-2 py-3 fs-5" onclick="cancelBooking()">CANCEL BOOKING</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS & Supabase Backend CENTRAL [33] -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../displayname.js"></script>
    <script>
        // ====================================================================
        // FRONTEND ENGINE: HUBUNGAN REAL-TIME DENGAN DISPLAYNAME.JS [33, 36]
        // ====================================================================

        const ROOM_NAME = "DFK 2"; 

        let curDay = ""; 
        let curStartIdx = 0; 
        let currentActiveSlot = "";
        let currentActiveBookingId = null; 
        let bookingData = {}; 

        // Dapatkan data login pengguna semasa
        let loggedInUser = localStorage.getItem('currentUser') || 'GUEST';
        let loggedInUserId = localStorage.getItem('currentUserId') || null;

        // Tarik data sebaik sahaja halaman dibuka
        window.onload = function() {
            fetchBookings();
            if (typeof checkUrlForExtension === "function") {
                checkUrlForExtension(); 
            }
        };

        function showRoomPhoto() { 
            new bootstrap.Modal(document.getElementById('photoModal')).show(); 
        }

        // Tarik data tempahan dari database [1.1.3, 33]
        async function fetchBookings() {
            resetTimetable(); 

            const { data: bookings, error } = await fetchBookingsFromDb(ROOM_NAME); 

            if (error) {
                console.error("Gagal mengambil data bookings:", error);
                return;
            }

            bookings.forEach(b => {
                const dayName = b.booking_day; 
                const startUI = convertToUITime(b.start_time);
                const endUI = convertToUITime(b.end_time);

                const startIdx = window.times.indexOf(startUI);
                const endIdx = window.times.indexOf(endUI);

                window.times.forEach((time, idx) => {
                    if (idx >= startIdx && idx < endIdx) {
                        const key = dayName + "-" + time.replace(/[: ]/g, '');
                        bookingData[key] = {
                            id: b.id, 
                            booker: b.booked_by,
                            subject: b.subject,
                            lecturer: b.lecturer,
                            startTime: startUI,
                            endTime: endUI,
                            status: b.status,
                            date: b.booking_date,      
                            startTimeRaw: b.start_time 
                        };
                        const cell = document.getElementById(key);
                        if (cell) {
                            cell.classList.remove('slot-available');
                            cell.classList.add('slot-booked');
                            cell.innerText = "BOOKED";
                        }
                    }
                });
            });
        }

        function resetTimetable() {
            bookingData = {};
            const cells = document.querySelectorAll('.timetable-slot');
            cells.forEach(cell => {
                cell.classList.remove('slot-booked');
                cell.classList.add('slot-available');
                cell.innerText = "AVAILABLE";
            });
        }

        function handleSlotClick(day, time) {
            const slotKey = day + "-" + time.replace(/[: ]/g, '');
            currentActiveSlot = slotKey;

            if (bookingData[slotKey]) {
                const data = bookingData[slotKey];
                currentActiveBookingId = data.id; 
                document.getElementById('infoBooker').innerText = data.booker;
                document.getElementById('infoSubject').innerText = data.subject;
                document.getElementById('infoLecturer').innerText = data.lecturer;
                document.getElementById('infoTimeRange').innerText = data.startTime + " - " + data.endTime;
                
                const statusSpan = document.getElementById('infoStatus');
                statusSpan.innerText = data.status;
                
                const isWindowActive = isCheckInWindowActive(data.date, data.startTimeRaw);
                const btnCheckIn = document.getElementById('btnCheckIn');
                
                if (data.status === 'Checked-In') {
                    statusSpan.className = "text-success fw-bold";
                    btnCheckIn.style.display = 'none'; 
                } else {
                    statusSpan.className = "text-warning fw-bold";
                    
                    if (isWindowActive) {
                        btnCheckIn.style.display = 'block'; 
                        btnCheckIn.removeAttribute('disabled');
                        btnCheckIn.className = "btn btn-roblox btn-success w-100 mt-4 py-3 fs-5";
                        btnCheckIn.innerText = "CONFIRM & CHECK-IN NOW";
                    } else {
                        btnCheckIn.style.display = 'block'; 
                        btnCheckIn.setAttribute('disabled', 'true'); 
                        btnCheckIn.className = "btn btn-roblox btn-secondary w-100 mt-4 py-3 fs-5 text-white";
                        btnCheckIn.innerText = "CHECK-IN NOT AVAILABLE YET";
                    }
                }
                
                new bootstrap.Modal(document.getElementById('infoModal')).show();
            } else {
                curDay = day; 
                curStartIdx = window.times.indexOf(time);
                document.getElementById('mDay').value = day;
                document.getElementById('mStart').value = time;
                
                const select = document.getElementById('mEnd');
                select.innerHTML = "";
                for (let i = curStartIdx + 1; i < window.times.length; i++) {
                    let opt = document.createElement('option');
                    opt.value = window.times[i]; 
                    opt.innerHTML = window.times[i];
                    select.appendChild(opt);
                }
                new bootstrap.Modal(document.getElementById('bookingModal')).show();
            }
        }

        // Hantar tempahan baharu melalui displayname.js [1.1.3, 33]
        async function processBooking() {
            const endVal = document.getElementById('mEnd').value;
            const subVal = document.getElementById('mSubject').value;
            const lecVal = document.getElementById('mLecturer').value;
            
            if (!subVal || !lecVal || !endVal) { 
                alert("PLEASE FILL ALL FIELDS!"); 
                return; 
            }

            const formattedDate = formattedDateString(curDay);

            const { data, error } = await insertNewBooking(
                loggedInUserId, 
                loggedInUser, 
                ROOM_NAME, 
                formattedDate, 
                curDay, 
                convertTo24Hour(document.getElementById('mStart').value), 
                convertTo24Hour(endVal), 
                subVal, 
                lecVal
            );

            if (error) {
                alert("Tempahan Gagal: " + error.message);
                console.error(error);
            } else {
                alert("BOOKING SUCCESSFUL!");
                bootstrap.Modal.getInstance(document.getElementById('bookingModal')).hide();
                fetchBookings(); 
            }
        }

        // Sahkan kehadiran melalui displayname.js [18, 33, 45]
        async function checkInBooking() {
            const { error } = await updateBookingToCheckIn(currentActiveBookingId);

            if (error) {
                alert("Check-In Gagal: " + error.message);
            } else {
                alert("CHECK-IN SUCCESSFUL! ENJOY YOUR CLASS!");
                bootstrap.Modal.getInstance(document.getElementById('infoModal')).hide();
                fetchBookings(); 
            }
        }

        // Batal tempahan melalui displayname.js [33]
        async function cancelBooking() {
            if (!confirm("DO YOU WANT TO CANCEL THIS?")) return;

            const { error } = await updateBookingToCancelled(currentActiveBookingId);

            if (error) {
                alert("Pembatalan Gagal: " + error.message);
            } else {
                alert("BOOKING CANCELLED!");
                bootstrap.Modal.getInstance(document.getElementById('infoModal')).hide();
                fetchBookings(); 
            }
        }

        // Terima pautan lanjutan masa dari emel [18, 33, 45, 46]
        async function checkUrlForExtension() {
            const urlParams = new URLSearchParams(window.location.search);
            const extendId = urlParams.get('extend_id');
            const originalEndTime = urlParams.get('end_time'); 
            
            if (extendId && originalEndTime) {
                window.history.replaceState({}, document.title, window.location.pathname);
                
                if (confirm(`DO YOU WANT TO EXTEND YOUR SESSION IN ROOM ${ROOM_NAME} BY 1 HOUR?`)) {
                    const [hours, minutes] = originalEndTime.split(':');
                    let newHours = parseInt(hours) + 1;
                    if (newHours >= 24) newHours = 0; 
                    const newEndTime = `${String(newHours).padStart(2, '0')}:${minutes}:00`;
                    
                    const { error } = await _supabase
                        .from('bookings')
                        .update({ end_time: newEndTime })
                        .eq('id', extendId);
                        
                    if (error) {
                        alert("Extension Failed: " + error.message);
                    } else {
                        alert("SESSION EXTENDED SUCCESSFULLY BY 1 HOUR!");
                        fetchBookings(); 
                    }
                }
            }
        }
    </script>
</body>
</html>
