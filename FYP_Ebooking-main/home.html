<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>HOME</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <!-- Link ke style_index.css dalam folder yang sama -->
    <link rel="stylesheet" href="style_index.css">
</head>
<body>
    <nav class="navbar navbar-dark mb-4 p-3 shadow">
        <div class="container text-uppercase">
            <a class="navbar-brand font-bungee" href="#"><i class="bi bi-house-door-fill"></i> HOME DASHBOARD</a>
            <!-- Pautan Log Out ke index.html dalam folder yang sama [35] -->
            <button class="btn btn-danger btn-sm font-bungee border-2 border-white" onclick="window.location.href='index.html'">LOG OUT</button>
        </div>
    </nav>

    <div class="container text-center">
        <div class="roblox-card w-100 mt-0" style="max-width: 800px; margin: auto;">
            <h1 class="font-bungee text-dark">WELCOME BACK, <span id="userDisp">PLAYER</span>!</h1>
            <!-- ID userAvatar untuk avatar dinamik dari DiceBear [37] -->
            <img id="userAvatar" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Isma" class="my-4" style="width: 150px; border: 5px solid var(--roblox-dark);">
            
            <div class="row g-3 text-uppercase">
                <div class="col-md-6">
                    <div class="btn-roblox card p-3 border-4 border-dark shadow">
                        <h4 class="font-bungee">MY STATUS</h4>
                        <p class="fw-bold text-success"><i class="bi bi-check-circle"></i> ACTIVE PLAYER</p>
                    </div>
                </div>

                <!-- PENDING CHECK-IN -->
                <div class="col-md-6">
                    <!-- DIKEMASKINI: Pautan asal yang sangat ringkas dan kemas tanpa nama subfolder bertindih [28, 35] -->
                    <div class="btn-roblox card p-4 border-4 border-dark shadow" id="checkInBox" style="background: white; transition: 0.3s; cursor: pointer;" onclick="window.location.href='USER_PAGE/check_in.html'">
                        <h4 class="font-bungee">PENDING CHECK-IN</h4>
                        <p class="fw-bold mb-0" id="checkInStatus" style="color: #ff8f00;">
                            <i class="bi bi-exclamation-triangle-fill"></i> 1 ROOM WAITING
                        </p>
                    </div>
                </div>
            </div>

            <!-- DIKEMASKINI: Pautan asal yang sangat ringkas dan kemas tanpa nama subfolder bertindih [28, 35] -->
            <button class="btn btn-roblox btn-success w-100 py-3 mt-4 fs-3 text-white" onclick="window.location.href='USER_PAGE/selection_page.html'">
                <i class="bi bi-calendar-check"></i> GO TO BOOKING SYSTEM
            </button>
        </div>
    </div>

    <script>
        const username = localStorage.getItem('currentUser') || 'USER';
        document.getElementById('userDisp').innerText = username;
        
        // GAMIFIKASI: Menukar rupa avatar secara automatik mengikut nama penuh yang mendaftar! [37]
        document.getElementById('userAvatar').src = 'https://api.dicebear.com/7.x/pixel-art/svg?seed=' + username;
   
        // Simpankan kod kawan awak untuk status box
        const hasPendingBooking = true; 
        const statusElement = document.getElementById('checkInStatus');
        const boxElement = document.getElementById('checkInBox');

        if (hasPendingBooking) {
            statusElement.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> DFK 1 WAITING';
            boxElement.style.backgroundColor = "#fff3cd"; 
            boxElement.classList.add('animate-pulse');
        } else {
            statusElement.innerHTML = '<i class="bi bi-check-circle-fill"></i> NO PENDING';
            statusElement.style.color = "#198754"; 
            boxElement.style.backgroundColor = "white";
        }
   </script>
</body>
</html>
