<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER VIEW | ADMIN HUB</title>
    <!-- Framework & Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Panggil CSS Utama Isma -->
    <link rel="stylesheet" href="/USER_PAGE/style_index.css">

    <style>
        body {
            margin: 0 !important;
            padding: 0 !important;
            background-color: #e0e0e0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar penuh kiri kanan */
        .navbar {
            background-color: #E2231A; /* Warna Merah Admin */
            border-bottom: 6px solid #393B3D;
            width: 100% !important;
            border-radius: 0 !important;
        }

        /* Styling Table Admin */
        .admin-table-container {
            background: white;
            border: 5px solid #393B3D;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
        }

        .timetable-slot { 
            min-width: 150px; 
            height: 95px; 
            border: 2px solid #393B3D !important; 
            vertical-align: middle !important;
            text-align: center;
            font-weight: bold;
            transition: 0.2s;
        }

        /* Slot Merah (Bila ada orang) */
        .slot-booked-admin {
            background-color: var(--roblox-red) !important;
            color: white !important;
            cursor: pointer;
        }
        
        .user-label { display: block; font-family: 'Bungee'; font-size: 0.85rem; }
        .subject-label { display: block; font-size: 0.65rem; opacity: 0.9; }

        /* Legend Style */
        .legend-box { 
            display: inline-block; 
            width: 18px; height: 18px; 
            border: 2px solid #000; 
            vertical-align: middle; 
            margin-right: 5px; 
        }

        /* Paksa Header Table Biru */
        thead th {
            background-color: rgb(106, 194, 242) !important;
            color: #000 !important;
            border: 3px solid #393B3D !important;
            padding: 15px !important;
        }

        .sticky-col {
            position: sticky;
            left: 0;
            background-color: rgb(106, 194, 242) !important;
            z-index: 2;
            border-right: 4px solid #393B3D !important;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark p-3 shadow">
        <div class="container-fluid text-uppercase">
            <a class="navbar-brand font-bungee" href="#">
                <i class="bi bi-eye-fill"></i> LIVE ROOM MONITORING
            </a>
            <button class="btn btn-dark btn-sm font-bungee border-2 border-white" onclick="window.location.href='home_admin.html'">
                BACK
            </button>
        </div>
    </nav>

    <div class="container-fluid px-4 mt-4 pb-5 text-uppercase">
        
        <!-- HEADER INFO (Dropdown & Server Status Sebelah-Sebelah) -->
        <div class="d-flex justify-content-between align-items-end mb-4">
            <div>
                <h2 class="font-bungee text-dark mb-0">LIVE FEED VIEW</h2>
                <div class="mt-2">
                    <span class="me-3 small fw-bold"><div class="legend-box bg-white"></div> AVAILABLE</span>
                    <span class="me-3 small fw-bold"><div class="legend-box" style="background: var(--roblox-red);"></div> OCCUPIED</span>
                    <span class="me-3 small fw-bold"><div class="legend-box bg-warning"></div> MAINTENANCE</span>
                </div>
            </div>

            <!-- GROUP DROPDOWN & SERVER STATUS -->
            <div class="d-flex align-items-center gap-2">
                <select class="form-select border-3 border-dark font-bungee shadow-sm" style="width: auto; height: 45px;">
                    <option>DFK 1</option>
                    <option>DFK 2</option>
                    <option>DFK 3</option>
                </select>
                
                <span class="badge bg-success border-3 border-dark p-2 d-flex align-items-center shadow-sm font-bungee" style="height: 45px; font-size: 0.8rem;">
                    SERVER: STABLE
                </span>
            </div>
        </div>

        <!-- TABLE AREA -->
        <div class="admin-table-container">
            <div class="table-responsive">
                <table class="table table-bordered mb-0">
                    <thead class="text-center">
                        <tr>
                            <th class="sticky-col">HARI / MASA</th>
                            <script>
                                const times = ["8:15 AM", "9:15 AM", "10:15 AM", "10:45 AM", "11:45 AM", "12:45 PM", "2:00 PM", "3:00 PM", "4:00 PM", "5:00 PM", "6:00 PM"];
                                times.forEach(t => document.write(`<th>${t}</th>`));
                            </script>
                        </tr>
                    </thead>
                    <tbody class="text-center">
                        <script>
                            const days = ["AHAD", "ISNIN", "SELASA", "RABU", "KHAMIS"];
                            days.forEach(day => {
                                document.write(`<tr>`);
                                document.write(`<td class="sticky-col fw-bold text-center border-2 border-dark">${day}</td>`);
                                
                                times.forEach(time => {
                                    // Contoh data: Kita buat satu slot Ditempah untuk demo
                                    if(day === "AHAD" && time === "9:15 AM") {
                                        document.write(`
                                            <td class="timetable-slot slot-booked-admin" onclick="openAdminModal('ISMA_PRO', 'CLOUD COMPUTING')">
                                                <span class="user-label">ISMA_PRO</span>
                                                <span class="subject-label">CLOUD COMP.</span>
                                            </td>`);
                                    } else {
                                        document.write(`
                                            <td class="timetable-slot bg-white text-primary fw-bold" onclick="alert('Set Maintenance for ${day} ${time}?')">
                                                AVAILABLE
                                            </td>`);
                                    }
                                });
                                document.write(`</tr>`);
                            });
                        </script>
                    </tbody>
                </table>
            </div>
        </div>
        <p class="mt-3 text-dark fw-bold small">* SCROLL HORIZONTALLY TO VIEW ALL SLOTS</p>
    </div>

    <!-- MODAL: ADMIN ACTION -->
    <div class="modal fade" id="adminModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-5 border-dark rounded-0">
                <div class="modal-header bg-dark text-white border-0 text-center">
                    <h5 class="modal-title font-bungee w-100">MODERATOR PANEL</h5>
                </div>
                <div class="modal-body text-center py-4 text-uppercase">
                    <h2 class="font-bungee text-danger mb-0" id="mUser">USER</h2>
                    <p class="fw-bold text-muted" id="mSub">SUBJECT</p>
                    <hr class="border-2 border-dark">
                    <div class="d-grid gap-2">
                        <button class="btn btn-roblox btn-danger py-3 fs-5" onclick="confirm('KICK PLAYER?')">KICK PLAYER</button>
                        <button class="btn btn-roblox btn-primary py-2" onclick="alert('Warning Sent')">SEND WARNING</button>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-roblox btn-dark w-100" data-bs-dismiss="modal">CLOSE</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function openAdminModal(user, subject) {
            document.getElementById('mUser').innerText = user;
            document.getElementById('mSub').innerText = "SUBJECT: " + subject;
            new bootstrap.Modal(document.getElementById('adminModal')).show();
        }
    </script>
</body>
</html>
